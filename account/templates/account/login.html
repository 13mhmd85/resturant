{% load static %}
<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ورود به فودلند 🍔</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'assets/css/style.css' %}">

</head>
<body>
<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <a class="navbar-brand" href="{% url 'home:home' %}">FoodLand 🍔</a>



</nav>

<!-- HERO -->
<div class="hero" id="card_icon" style="border-color: #393E46;border-style: dotted">
    <a href="{% url 'home:home' %}">
    <img href="{% url 'home:home' %}" src="{% static 'assets/images/icon.png' %}" alt="FoodLand">
    <h5>FoodLand</h5>
    </a>
</div>

<h1  class="text-center mb-4">{{ error }}</h1>
<section style="width:600px"   class="container my-5">
  <div class="card p-4 shadow-lg border-0 reservation-section">
    <h2 class="text-center mb-4">ورود به فودلند 🍔</h2>
    <form method="POST" action="">
      {% csrf_token %}
      <div class="mb-3">
        <label for="username" class="form-label fw-bold">نام کاربری</label>
        <div class="input-group">
          <span class="input-group-text">👤</span>
          <input type="text" class="form-control" id="username" name="username" placeholder="نام کاربری خود را وارد کنید">
        </div>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label fw-bold">رمز عبور</label>
        <div class="input-group">
          <span class="input-group-text">🔒</span>
          <input type="password" class="form-control" id="password" name="password" placeholder="رمز عبور خود را وارد کنید">
        </div>
      </div>

      <button type="submit" class="btn w-100 fw-bold mt-3">ورود ✅</button>
      <p class="mt-3 text-center">حساب کاربری ندارید؟ <a href="{% url 'account:register' %}">ثبت نام کنید</a></p>
    </form>
  </div>
</section>

</body>
</html>
