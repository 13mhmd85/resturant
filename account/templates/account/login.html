{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    {% include 'includes/header_link.html' %}
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login to FoodLand 🍔</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{% static 'assets/css/style.css' %}">
</head>
<body>
<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <a class="navbar-brand" href="{% url 'home:home' %}">FoodLand 🍔</a>
</nav>

<!-- HERO -->
<div class="hero" id="card_icon" style="border-color: #393E46;border-style: none">
    <a href="{% url 'home:home' %}">
    <img href="{% url 'home:home' %}" src="{% static 'assets/images/icon.png' %}" alt="FoodLand">
    <h5>FoodLand 🍔</h5>
    </a>
</div>

<h1 class="text-center mb-4">{{ error }}</h1>

<section style="width:600px" class="container my-5">
  <div class="card p-4 shadow-lg border-0 reservation-section">
    <h2 class="text-center mb-4">Login to FoodLand 🍔</h2>
    <form method="POST" action="">
      {% csrf_token %}
         <a href="{% url 'home:home' %}" class="back-btn">
        <img src="{% static 'assets/images/back icon.png' %}" alt="Back">
    </a>
      <div class="mb-3">
        <label for="username" class="form-label fw-bold">Username</label>
        <div class="input-group">
          <span class="input-group-text">👤</span>
          <input type="text" class="form-control" id="username" name="username" placeholder="Enter your username">
        </div>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label fw-bold">Password</label>
        <div class="input-group">
          <span class="input-group-text">🔒</span>
          <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password">
        </div>
      </div>

      <button type="submit" class="btn btn-success w-100 fw-bold mt-3">Login ✅</button>
      <p class="mt-3 text-center">Don't have an account? <a href="{% url 'account:register' %}">Register here</a></p>
    </form>
  </div>
</section>

</body>
</html>
