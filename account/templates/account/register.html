{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    {% include 'includes/header_link.html' %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register at FoodLand 🍔</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'assets/css/style.css' %}">
</head>
<body>
<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <a class="navbar-brand" href="{% url 'home:home' %}">FoodLand 🍔</a>
</nav>

<!-- HERO -->
<div class="hero" id="card_icon" style="border-color: #393E46;border-style: none">
    <a href="{% url 'home:home' %}">
    <img href="{% url 'home:home' %}" src="{% static 'assets/images/icon.png' %}" alt="FoodLand">
    <h5>FoodLand 🍔</h5>
    </a>
</div>

<section style="width:600px" class="container my-5">
    {% if error %}
        {% for error in error %}
            <p style="border-style: groove;border-color: #00ADB5;" class="text text-center bg-danger"> {{ error }}</p>
        {% endfor %}
    {% endif %}

    <div class="card p-4 shadow-lg border-0 reservation-section">
        <h2 class="text-center mb-4">Register at FoodLand 🍔</h2>
        <form method="POST" action="">
             <a href="{% url 'home:home' %}" class="back-btn">
                <img src="{% static 'assets/images/back icon.png' %}" alt="Back">
            </a>
            {% csrf_token %}

            <div class="mb-3">
                <label for="fullname" class="form-label fw-bold">Full Name</label>
                <div class="input-group">
                    <span class="input-group-text">👤</span>
                    <input required type="text" class="form-control" id="fullname" name="fullname" placeholder="Enter your full name">
                </div>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label fw-bold">Email</label>
                <div class="input-group">
                    <span class="input-group-text">✉️</span>
                    <input required type="email" class="form-control" id="email" name="email" placeholder="e.g. demo@gmail.com">
                </div>
            </div>

            <div class="mb-3">
                <label for="username" class="form-label fw-bold">Username</label>
                <div class="input-group">
                    <span class="input-group-text">👤</span>
                    <input required type="text" class="form-control" id="username" name="username"
                           placeholder="Choose a username">
                </div>
            </div>

            <div class="mb-3">
                <label for="password1" class="form-label fw-bold">Password</label>
                <div class="input-group">
                    <span class="input-group-text">🔒</span>
                    <input required type="password" class="form-control" id="password1" name="password1"
                           placeholder="Choose a password">
                </div>
            </div>

            <div class="mb-3">
                <label for="password2" class="form-label fw-bold">Confirm Password</label>
                <div class="input-group">
                    <span class="input-group-text">🔒</span>
                    <input required type="password" class="form-control" id="password2" name="password2"
                           placeholder="Repeat your password">
                </div>
            </div>

            <button type="submit" class="btn w-100 fw-bold mt-3">Register ✅</button>
            <p class="mt-3 text-center">Already have an account? <a href="{% url 'account:login' %}">Login here</a></p>
        </form>
    </div>
</section>

</body>
</html>
