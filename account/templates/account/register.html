{% load static %}
<!DOCTYPE html>
<html lang="fa">
<head>
    {% include 'includes/header_link.html' %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثبت نام در فودلند 🍔</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'assets/css/style.css' %}">


</head>
<body>
<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <a class="navbar-brand" href="{% url 'home:home' %}">FoodLand 🍔</a>


</nav>

<!-- HERO -->
<div class="hero" id="card_icon" style="border-color: #393E46;border-style: none">
    <a href="{% url 'home:home' %}">
    <img href="{% url 'home:home' %}" src="{% static 'assets/images/icon.png' %}" alt="FoodLand">
    <h5>FoodLand 🍔</h5>
    </a>
</div>
<section style="width:600px" class="container my-5">
    {% if error %}
        {% for error in error %}

            <p style="border-style: groove;border-color: #00ADB5;" class="text text-center bg-danger"> {{ error }}</p>
        {% endfor %}

    {% endif %}
    <div class="card p-4 shadow-lg border-0 reservation-section">
        <h2 class="text-center mb-4">ثبت نام در فودلند🍔 </h2>
        <form method="POST" action="">
             <a href="{% url 'home:home' %}" class="back-btn">
        <img src="{% static 'assets/images/back icon.png' %}" alt="بازگشت">
    </a>
            {% csrf_token %}
            <div class="mb-3">
                <label for="fullname" class="form-label fw-bold">نام و نام خانوادگی</label>
                <div class="input-group">
                    <span class="input-group-text">👤</span>
                    <input required type="text" class="form-control" id="fullname" name="fullname" placeholder="نام کامل خود">
                </div>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label fw-bold">ایمیل</label>
                <div class="input-group">
                    <span class="input-group-text">✉️</span>
                    <input required type="email" class="form-control" id="email" name="email" placeholder="مثلاً demo@gmail.com">
                </div>
            </div>

            <div class="mb-3">
                <label for="username" class="form-label fw-bold">نام کاربری</label>
                <div class="input-group">
                    <span class="input-group-text">👤</span>
                    <input required type="text" class="form-control" id="username" name="username"
                           placeholder="نام کاربری دلخواه">
                </div>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label fw-bold">رمز عبور</label>
                <div class="input-group">
                    <span class="input-group-text">🔒</span>
                    <input required type="password" class="form-control" id="password" name="password1"
                           placeholder="رمز عبور دلخواه">
                </div>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label fw-bold">تکرار رمز عبور</label>
                <div class="input-group">
                    <span class="input-group-text">🔒</span>
                    <input required type="password" class="form-control" id="password" name="password2"
                           placeholder=" تکرار رمز عبور دلخواه">
                </div>
            </div>

            <button type="submit" class="btn w-100 fw-bold mt-3">ثبت نام ✅</button>
            <p class="mt-3 text-center">حساب کاربری دارید؟ <a href="{% url 'account:login' %}">وارد شوید</a></p>
        </form>
    </div>
</section>

</body>
</html>
